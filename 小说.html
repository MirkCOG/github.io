<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>小说</title>
    <style>
        /* ===== CSS 变量 & 主题 ===== */
        :root {
            --bg: #f5f0eb;
            --bg-sidebar: #ede8e2;
            --text: #2c2c2c;
            --text-muted: #777;
            --text-title: #1a1a1a;
            --border: #ddd6ce;
            --shadow: rgba(0, 0, 0, 0.06);
            --hover: #e3dcd4;
            --accent: #b8860b;
            --accent-light: #d4a84b;
            --card-bg: #fcf9f6;
            --font-size: 18px;
            --line-height: 1.9;
            --max-width: 780px;
            --radius: 12px;
            --transition: 0.3s ease;
        }

        [data-theme="dark"] {
            --bg: #1a1a1e;
            --bg-sidebar: #252529;
            --text: #d0d0d0;
            --text-muted: #888;
            --text-title: #eee;
            --border: #3a3a40;
            --shadow: rgba(0, 0, 0, 0.4);
            --hover: #333338;
            --accent: #d4a84b;
            --accent-light: #e8c86a;
            --card-bg: #222226;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: var(--font-size);
            line-height: var(--line-height);
            transition: background var(--transition), color var(--transition);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        ::-webkit-scrollbar { width:4px; height:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
        ::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }

        /* ===== 顶部栏 ===== */
        .header {
            flex-shrink:0;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:8px 12px;
            background:var(--card-bg);
            border-bottom:1px solid var(--border);
            box-shadow:0 1px 4px var(--shadow);
            z-index:100;
            transition:background var(--transition), border var(--transition);
            flex-wrap:nowrap;
            gap:6px;
        }
        .header-left { display:flex; align-items:center; gap:8px; min-width:0; flex-shrink:0; }
        .header-left .logo { font-size:18px; font-weight:700; color:var(--accent); white-space:nowrap; display:flex; align-items:center; gap:4px; }
        .header-left .logo span { font-size:14px; color:var(--text-muted); font-weight:400; }
        .header-left .book-title { font-size:13px; color:var(--text-muted); max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-left:2px; }

        .header-center {
            display:flex;
            align-items:center;
            gap:4px;
            flex:1;
            justify-content:center;
            min-width:0;
        }
        .header-center .chapter-progress {
            font-size:13px;
            color:var(--text);
            white-space:nowrap;
            font-weight:500;
            flex-shrink:0;
        }
        .header-center .jump-input {
            width:60px;
            padding:4px 6px;
            border:1px solid var(--border);
            border-radius:6px;
            background:var(--bg);
            color:var(--text);
            font-size:13px;
            text-align:center;
            outline:none;
            transition:border 0.2s;
            font-family:inherit;
            flex-shrink:0;
        }
        .header-center .jump-input:focus {
            border-color:var(--accent);
            box-shadow:0 0 0 2px rgba(184,134,11,0.2);
        }
        .header-center .jump-btn {
            padding:4px 10px;
            border:1px solid var(--border);
            border-radius:6px;
            background:var(--accent);
            color:#fff;
            font-size:13px;
            cursor:pointer;
            transition:background 0.2s;
            font-family:inherit;
            flex-shrink:0;
            white-space:nowrap;
        }
        .header-center .jump-btn:hover {
            background:var(--accent-light);
        }
        .header-center .jump-btn:active {
            transform:scale(0.96);
        }
        .header-center .jump-btn:disabled {
            opacity:0.5;
            cursor:not-allowed;
        }

        .header-right {
            display:flex;
            align-items:center;
            gap:4px;
            flex-shrink:0;
        }
        .header-right button {
            background:none;
            border:none;
            cursor:pointer;
            font-size:16px;
            padding:4px 6px;
            border-radius:6px;
            color:var(--text-muted);
            transition:background var(--transition), color var(--transition);
            display:flex;
            align-items:center;
            justify-content:center;
            line-height:1;
        }
        .header-right button:hover { background:var(--hover); color:var(--text); }
        .header-right .font-size-group {
            display:flex;
            align-items:center;
            gap:2px;
            background:var(--bg);
            border-radius:6px;
            padding:2px;
        }
        .header-right .font-size-group button { font-size:13px; padding:2px 5px; min-width:22px; border-radius:4px; }
        .header-right .font-size-group .size-label { font-size:11px; color:var(--text-muted); padding:0 2px; min-width:18px; text-align:center; }
        .btn-copy-link { font-size:15px !important; }
        .btn-copy-link.copied { color:var(--accent) !important; }

        /* ===== 主体 ===== */
        .main { display:flex; flex:1; overflow:hidden; position:relative; }

        /* ===== 侧边栏 ===== */
        .sidebar {
            flex-shrink:0;
            width:260px;
            background:var(--bg-sidebar);
            border-right:1px solid var(--border);
            overflow-y:auto;
            padding:12px 0 20px 0;
            transition:transform 0.3s ease, width 0.3s ease, background var(--transition), border var(--transition);
            z-index:50;
            display:flex;
            flex-direction:column;
        }
        .sidebar-header { padding:0 14px 10px 14px; font-size:13px; font-weight:600; color:var(--text-muted); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
        .sidebar-header .count { font-weight:400; font-size:12px; }
        .sidebar .file-list { list-style:none; padding:6px 0; flex:1; overflow-y:auto; }
        .sidebar .file-list li { padding:10px 16px; cursor:pointer; font-size:14px; border-left:3px solid transparent; transition:background 0.15s, border-color 0.15s, color 0.15s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); border-radius:0 6px 6px 0; margin:1px 4px 1px 0; display:flex; align-items:center; gap:8px; -webkit-tap-highlight-color:transparent; }
        .sidebar .file-list li:active { background:var(--hover); }
        .sidebar .file-list li.active { border-left-color:var(--accent); background:var(--hover); color:var(--accent); font-weight:600; }
        .sidebar .file-list li .file-icon { font-size:16px; flex-shrink:0; }
        .sidebar .file-list li .file-name { overflow:hidden; text-overflow:ellipsis; }

        /* ===== 内容区域 ===== */
        .content { flex:1; overflow-y:auto; padding:20px 16px 30px 16px; background:var(--bg); transition:background var(--transition); scroll-behavior:smooth; position:relative; -webkit-overflow-scrolling:touch; }
        .content-inner { max-width:var(--max-width); margin:0 auto; padding-bottom:50px; }

        .chapter-title { font-size:calc(var(--font-size) * 1.4); font-weight:700; text-align:center; color:var(--text-title); margin:0 0 20px 0; padding-top:6px; letter-spacing:1px; line-height:1.5; transition:color var(--transition); }
        .chapter-body { font-size:var(--font-size); line-height:var(--line-height); color:var(--text); transition:color var(--transition); }
        .chapter-body p { text-indent:2em; margin:0 0 0.5em 0; word-break:break-word; }
        .chapter-body p:last-child { margin-bottom:0; }
        .chapter-body .empty-line { height:0.5em; }

        /* ===== 底部导航 ===== */
        .footer {
            flex-shrink:0;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:8px 12px;
            background:var(--card-bg);
            border-top:1px solid var(--border);
            box-shadow:0 -1px 4px var(--shadow);
            transition:background var(--transition), border var(--transition);
            flex-wrap:wrap;
            gap:4px;
            z-index:100;
        }
        .footer .progress { font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
        .footer .progress .bar-wrap { width:80px; height:3px; background:var(--border); border-radius:3px; overflow:hidden; }
        .footer .progress .bar-wrap .bar { height:100%; background:var(--accent); border-radius:3px; transition:width 0.3s; width:0%; }
        .footer .nav-buttons { display:flex; gap:4px; }
        .footer .nav-buttons button { padding:6px 12px; border:1px solid var(--border); background:var(--bg); color:var(--text); border-radius:6px; cursor:pointer; font-size:13px; transition:background 0.2s, color 0.2s, border 0.2s; font-family:inherit; -webkit-tap-highlight-color:transparent; min-height:36px; display:flex; align-items:center; gap:3px; }
        .footer .nav-buttons button:active { background:var(--hover); }
        .footer .nav-buttons button:hover:not(:disabled) { background:var(--hover); border-color:var(--accent-light); }
        .footer .nav-buttons button:disabled { opacity:0.35; cursor:not-allowed; }
        .footer .nav-buttons button .key-hint { font-size:10px; color:var(--text-muted); margin-left:2px; }

        /* ===== 加载 & 空状态 ===== */
        .loading-overlay, .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-muted); text-align:center; padding:30px 20px; }
        .loading-overlay .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.9s linear infinite; margin-bottom:16px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .empty-state .icon { font-size:48px; margin-bottom:12px; }
        .empty-state h2 { font-size:18px; font-weight:600; color:var(--text-title); margin-bottom:6px; }
        .empty-state p { max-width:360px; font-size:13px; color:var(--text-muted); line-height:1.6; }

        /* ===== 移动端适配 ===== */
        .menu-toggle {
            display:none;
            background:none;
            border:none;
            font-size:22px;
            cursor:pointer;
            color:var(--text);
            padding:4px 8px;
            border-radius:6px;
            transition:background 0.2s;
            -webkit-tap-highlight-color:transparent;
        }
        .menu-toggle:active { background:var(--hover); }
        .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:40; opacity:0; transition:opacity 0.3s; }
        .sidebar-overlay.show { opacity:1; }

        @media (max-width:768px) {
            .sidebar { position:fixed; top:0; left:0; bottom:0; width:260px; transform:translateX(-100%); border-right:1px solid var(--border); box-shadow:4px 0 20px rgba(0,0,0,0.15); z-index:60; border-radius:0 12px 12px 0; padding-top:10px; }
            .sidebar.open { transform:translateX(0); }
            .sidebar-overlay.show { display:block; }
            .menu-toggle { display:inline-flex; }
            .header { padding:6px 10px; flex-wrap:nowrap; gap:4px; }
            .header-left .book-title { max-width:80px; font-size:12px; }
            .header-left .logo { font-size:16px; }
            .header-left .logo span { font-size:12px; }
            .header-center .chapter-progress { font-size:12px; }
            .header-center .jump-input { width:50px; font-size:12px; padding:3px 4px; }
            .header-center .jump-btn { font-size:12px; padding:3px 8px; }
            .content { padding:16px 12px 24px 12px; }
            .footer { padding:6px 10px; }
            .footer .progress .bar-wrap { width:60px; }
            .footer .nav-buttons button { padding:4px 10px; font-size:12px; min-height:32px; }
            .chapter-title { font-size:calc(var(--font-size) * 1.2); margin-bottom:14px; }
            .header-right .font-size-group button { font-size:12px; padding:2px 4px; min-width:20px; }
            .header-right button { font-size:14px; padding:3px 6px; }
            .sidebar .file-list li { padding:12px 16px; font-size:14px; }
        }
        @media (max-width:480px) {
            .header-left .book-title { max-width:60px; font-size:11px; }
            .header-center .chapter-progress { font-size:11px; }
            .header-center .jump-input { width:44px; font-size:11px; padding:2px 3px; }
            .header-center .jump-btn { font-size:11px; padding:2px 6px; }
            .content { padding:12px 10px 20px 10px; }
            .footer .nav-buttons button { font-size:11px; padding:3px 8px; min-height:28px; }
            .chapter-title { font-size:calc(var(--font-size) * 1.1); }
            .sidebar { width:240px; }
        }

        .hidden { display:none !important; }
        .toast {
            position:fixed;
            bottom:70px;
            left:50%;
            transform:translateX(-50%);
            background:var(--card-bg);
            color:var(--text);
            padding:8px 18px;
            border-radius:8px;
            box-shadow:0 4px 16px rgba(0,0,0,0.12);
            border:1px solid var(--border);
            font-size:13px;
            z-index:200;
            opacity:0;
            transition:opacity 0.3s, transform 0.3s;
            pointer-events:none;
            white-space:nowrap;
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        @media (max-width:480px) { .toast { bottom:60px; font-size:12px; padding:6px 14px; white-space:normal; max-width:90%; } }

        .file-protocol-warning {
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.7);
            z-index:999;
            justify-content:center;
            align-items:center;
            color:#fff;
            font-size:18px;
            padding:20px;
            text-align:center;
        }
        .file-protocol-warning .card {
            background:var(--card-bg);
            color:var(--text);
            max-width:480px;
            padding:24px 20px;
            border-radius:14px;
            box-shadow:0 8px 32px rgba(0,0,0,0.4);
        }
        .file-protocol-warning .card h2 { margin-bottom:10px; font-size:20px; }
        .file-protocol-warning .card p { font-size:14px; line-height:1.7; margin-bottom:14px; }
        .file-protocol-warning .card code { background:var(--bg); padding:2px 8px; border-radius:4px; font-size:13px; }
        .file-protocol-warning .card .btn-close-warning { padding:6px 20px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:14px; }
        .file-protocol-warning .card .btn-close-warning:hover { background:var(--accent-light); }
        .file-protocol-warning.show { display:flex; }
    </style>
</head>
<body>

    <!-- ===== 文件协议警告遮罩 ===== -->
    <div class="file-protocol-warning" id="fileProtocolWarning">
        <div class="card">
            <h2>⚠️ 请使用 HTTP 服务器打开</h2>
            <p>检测到您直接双击了 HTML 文件（<code>file://</code> 协议），这可能导致跨域请求被阻止，无法加载小说列表。<br><br>请使用以下方式之一：</p>
            <p style="text-align:left; font-size:14px;">
                ✅ <strong>VS Code</strong>：Live Server 插件<br>
                ✅ <strong>Python</strong>：<code>python -m http.server 8000</code><br>
                ✅ <strong>Node.js</strong>：<code>npx serve</code>
            </p>
            <button class="btn-close-warning" id="closeWarningBtn">我已了解，继续尝试</button>
        </div>
    </div>

    <!-- ===== 顶部栏 ===== -->
    <header class="header">
        <div class="header-left">
            <button class="menu-toggle" id="menuToggle" aria-label="切换书架">☰</button>
            <div class="logo">📚 <span>书架</span></div>
            <div class="book-title" id="bookTitle">加载中…</div>
        </div>
        <div class="header-center">
            <span class="chapter-progress" id="chapterProgress">— / —</span>
            <input type="number" class="jump-input" id="jumpInput" min="1" placeholder="章" />
            <button class="jump-btn" id="jumpBtn">跳转</button>
        </div>
        <div class="header-right">
            <button class="btn-copy-link" id="copyLinkBtn" aria-label="复制章节链接" title="复制当前章节链接">📋</button>
            <div class="font-size-group">
                <button id="fontDec" aria-label="减小字号">A-</button>
                <span class="size-label" id="fontSizeLabel">18</span>
                <button id="fontInc" aria-label="增大字号">A+</button>
            </div>
            <button id="themeToggle" aria-label="切换主题">🌙</button>
        </div>
    </header>

    <!-- ===== 主体 ===== -->
    <div class="main">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>📖 小说列表</span>
                <span class="count" id="fileCount">0 本</span>
            </div>
            <ul class="file-list" id="fileList"></ul>
        </nav>
        <main class="content" id="contentArea">
            <div class="content-inner" id="contentInner">
                <div class="empty-state" id="emptyState">
                    <div class="icon">📚</div>
                    <h2>正在加载小说列表…</h2>
                    <p>请稍候，即将自动加载您的书架。</p>
                </div>
                <div class="loading-overlay hidden" id="loadingState">
                    <div class="spinner"></div>
                    <p>正在加载小说列表…</p>
                </div>
                <div id="readerContent" class="hidden"></div>
            </div>
        </main>
    </div>

    <!-- ===== 底部导航 ===== -->
    <footer class="footer" id="footerNav">
        <div class="progress">
            <span id="progressLabel">未阅读</span>
            <div class="bar-wrap">
                <div class="bar" id="progressBar"></div>
            </div>
        </div>
        <div class="nav-buttons">
            <button id="prevChapter" disabled>◀ 上一章 <span class="key-hint">←</span></button>
            <button id="nextChapter" disabled>下一章 ▶ <span class="key-hint">→</span></button>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            'use strict';

            // ---------- 检测 file:// 协议 ----------
            const isFileProtocol = window.location.protocol === 'file:';
            const warningEl = document.getElementById('fileProtocolWarning');
            const closeWarningBtn = document.getElementById('closeWarningBtn');
            if (isFileProtocol) {
                warningEl.classList.add('show');
                closeWarningBtn.addEventListener('click', function() {
                    warningEl.classList.remove('show');
                });
            }

            // ---------- DOM 引用 ----------
            const emptyState = document.getElementById('emptyState');
            const loadingState = document.getElementById('loadingState');
            const readerContent = document.getElementById('readerContent');
            const fileList = document.getElementById('fileList');
            const fileCount = document.getElementById('fileCount');
            const bookTitle = document.getElementById('bookTitle');
            const chapterProgress = document.getElementById('chapterProgress');
            const progressLabel = document.getElementById('progressLabel');
            const progressBar = document.getElementById('progressBar');
            const prevBtn = document.getElementById('prevChapter');
            const nextBtn = document.getElementById('nextChapter');
            const themeToggle = document.getElementById('themeToggle');
            const fontDec = document.getElementById('fontDec');
            const fontInc = document.getElementById('fontInc');
            const fontSizeLabel = document.getElementById('fontSizeLabel');
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            const contentArea = document.getElementById('contentArea');
            const toast = document.getElementById('toast');
            const copyLinkBtn = document.getElementById('copyLinkBtn');
            const jumpInput = document.getElementById('jumpInput');
            const jumpBtn = document.getElementById('jumpBtn');

            // ---------- 状态 ----------
            let files = [];
            let chapters = [];
            let currentChapterIndex = 0;
            let currentFileIndex = -1;
            let isLoading = false;
            let fontSize = 18;
            let theme = 'light';
            let isSidebarOpen = false;
            let currentRepo = '';
            let isAutoScrolling = false;
            let loadedChapterCount = 0;

            // ---------- 安全的 localStorage ----------
            function safeLocalStorage() {
                try { localStorage.setItem('test','test'); localStorage.removeItem('test'); return localStorage; } catch(e) { return null; }
            }
            const storage = safeLocalStorage();
            function safeSetItem(k,v) { if(storage) try { storage.setItem(k,v); } catch(e){} }
            function safeGetItem(k) { if(storage) try { return storage.getItem(k); } catch(e){} return null; }

            // ---------- 工具函数 ----------
            function showToast(msg, duration) {
                duration = duration || 2000;
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => { toast.classList.remove('show'); }, duration);
            }
            function showError(msg) { showToast('❌ ' + msg, 3000); }
            function escapeHtml(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

            // ===== Gitee 仓库解析 =====
            function parseRepoUrl(url) {
                url = url.trim();
                const match = url.match(/^https?:\/\/gitee\.com\/([^\/]+\/[^\/]+)\/?$/);
                return match ? match[1] : null;
            }

            // ===== Gitee API 获取文件列表 =====
            async function fetchRepoFiles(repo) {
                const apiUrl = `https://gitee.com/api/v5/repos/${repo}/contents/`;
                const response = await fetch(apiUrl, { headers: { 'Accept':'application/json' } });
                if (!response.ok) {
                    if (response.status === 404) throw new Error('仓库不存在或没有公开访问权限');
                    if (response.status === 403) throw new Error('API 请求频率限制，请稍后再试');
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                if (!Array.isArray(data)) throw new Error('无法解析文件列表');
                return data.filter(item => item.type === 'file' && item.name.toLowerCase().endsWith('.txt'))
                           .map(item => ({ name: item.name, path: item.path, size: item.size }));
            }

            // ===== 通过 Gitee API 获取文件内容 =====
            async function fetchFileContent(repo, path) {
                const apiUrl = `https://gitee.com/api/v5/repos/${repo}/contents/${encodeURIComponent(path)}`;
                const response = await fetch(apiUrl, { headers: { 'Accept':'application/json' } });
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                const data = await response.json();
                if (!data.content) throw new Error('文件内容为空');
                const raw = atob(data.content.replace(/\s/g, ''));
                try { return decodeURIComponent(escape(raw)); }
                catch(e) { const bytes = Uint8Array.from(raw, c => c.charCodeAt(0)); return new TextDecoder('utf-8').decode(bytes); }
            }

            // ===== 小说解析 =====
            function parseNovel(text) {
                const lines = text.split(/\r?\n/);
                const result = [];
                let currentTitle = '全文', currentContent = [], foundChapter = false;
                const PATTERNS = [
                    /^(第[零一二三四五六七八九十百千万0-9]+章)\s*(.*)/,
                    /^(第[零一二三四五六七八九十百千万0-9]+节)\s*(.*)/,
                    /^(第[零一二三四五六七八九十百千万0-9]+回)\s*(.*)/,
                    /^(卷[零一二三四五六七八九十百千万0-9]+)\s*(.*)/,
                    /^(Chapter\s*\d+)\s*(.*)/i,
                    /^(第[零一二三四五六七八九十百千万0-9]+部分)\s*(.*)/,
                    /^(序章|楔子|尾声|后记|番外|终章|引子|前言|后序)\s*(.*)/,
                ];
                for (const line of lines) {
                    const l = line.trim();
                    if (!l) continue;
                    let matched = false;
                    for (const p of PATTERNS) {
                        const m = l.match(p);
                        if (m) {
                            matched = true;
                            let title = m[1];
                            if (m[2] && m[2].trim()) title += ' ' + m[2].trim();
                            if (currentContent.length > 0 || foundChapter) {
                                result.push({ title: currentTitle || '未命名章节', content: currentContent.join('\n') });
                            } else {
                                if (currentContent.length > 0) result.push({ title: currentTitle || '前言', content: currentContent.join('\n') });
                            }
                            currentTitle = title;
                            currentContent = [];
                            foundChapter = true;
                            break;
                        }
                    }
                    if (!matched) currentContent.push(line);
                }
                if (currentContent.length > 0 || foundChapter) {
                    result.push({ title: currentTitle || '未命名章节', content: currentContent.join('\n') });
                }
                if (result.length === 0) {
                    const content = lines.join('\n').trim();
                    if (content) result.push({ title: '全文', content });
                    else result.push({ title: '空内容', content: '' });
                }
                for (const ch of result) {
                    let lines2 = ch.content.split(/\r?\n/);
                    while (lines2.length > 0 && lines2[0].trim() === '') lines2.shift();
                    while (lines2.length > 0 && lines2[lines2.length-1].trim() === '') lines2.pop();
                    ch.content = lines2.join('\n');
                }
                return result.filter(ch => ch.content.trim().length > 0 || ch.title);
            }

            // ===== 渲染单章 =====
            function renderChapterHtml(index) {
                if (!chapters.length || index < 0 || index >= chapters.length) return '';
                const ch = chapters[index];
                const lines = ch.content.split(/\r?\n/);
                let html = `<div class="chapter-title">${escapeHtml(ch.title)}</div><div class="chapter-body">`;
                let inP = false;
                for (const line of lines) {
                    const t = line.trim();
                    if (t === '') {
                        if (inP) { html += '</p>'; inP = false; }
                        html += '<div class="empty-line"></div>';
                    } else {
                        if (!inP) { html += '<p>'; inP = true; }
                        else { html += '</p><p>'; }
                        html += escapeHtml(t);
                    }
                }
                if (inP) html += '</p>';
                html += '</div>';
                return html;
            }

            // ===== 重置阅读内容 =====
            function resetReaderContent(startIndex) {
                if (!chapters.length) return;
                const html = renderChapterHtml(startIndex);
                readerContent.innerHTML = html;
                loadedChapterCount = startIndex + 1;
                currentChapterIndex = startIndex;
                contentArea.scrollTop = 0;
                updateFooter(currentChapterIndex);
                updateChapterProgress(currentChapterIndex);
                saveProgress(currentChapterIndex);
                updateSidebarHighlight();
                if (currentFileIndex >= 0 && currentFileIndex < files.length) {
                    bookTitle.textContent = files[currentFileIndex].name.replace(/\.txt$/i, '');
                }
                readerContent.classList.remove('hidden');
                emptyState.classList.add('hidden');
                loadingState.classList.add('hidden');
                // 更新跳转输入框的 placeholder 或值
                jumpInput.placeholder = `${startIndex+1}`;
                jumpInput.value = '';
            }

            // ===== 追加下一章 =====
            function appendNextChapter() {
                if (loadedChapterCount >= chapters.length) {
                    showToast('已经是最后一章了', 1500);
                    return false;
                }
                const nextIdx = loadedChapterCount;
                const html = renderChapterHtml(nextIdx);
                readerContent.insertAdjacentHTML('beforeend', html);
                loadedChapterCount++;
                currentChapterIndex = nextIdx;
                updateFooter(currentChapterIndex);
                updateChapterProgress(currentChapterIndex);
                saveProgress(currentChapterIndex);
                updateSidebarHighlight();
                jumpInput.placeholder = `${currentChapterIndex+1}`;
                return true;
            }

            // ===== 跳转章节 =====
            function goToChapter(index) {
                if (isLoading) return;
                if (index < 0) index = 0;
                if (index >= chapters.length) index = chapters.length - 1;
                // 如果已经是当前章节且全部加载，则仅滚动到顶部
                if (index === currentChapterIndex && loadedChapterCount === chapters.length) {
                    contentArea.scrollTop = 0;
                    return;
                }
                resetReaderContent(index);
            }

            // ===== 跳转输入框处理 =====
            function handleJump() {
                if (!chapters.length) {
                    showToast('请先打开一本小说', 1500);
                    return;
                }
                const val = parseInt(jumpInput.value, 10);
                if (isNaN(val) || val < 1) {
                    showToast('请输入有效的章节号（≥1）', 1500);
                    return;
                }
                const idx = val - 1;
                if (idx >= chapters.length) {
                    showToast(`章节号最大为 ${chapters.length}`, 1500);
                    return;
                }
                goToChapter(idx);
                jumpInput.value = '';
            }

            function goToNext() {
                if (currentChapterIndex < chapters.length - 1) {
                    goToChapter(currentChapterIndex + 1);
                }
            }

            function goToPrev() {
                if (currentChapterIndex > 0) {
                    goToChapter(currentChapterIndex - 1);
                }
            }

            // 自动翻页（保持滚动）
            function autoNextChapter() {
                if (loadedChapterCount < chapters.length) {
                    const success = appendNextChapter();
                    if (success) showToast(`已加载下一章：${chapters[currentChapterIndex].title}`, 1200);
                }
            }

            // ===== 更新界面 =====
            function updateChapterProgress(index) {
                const total = chapters.length;
                chapterProgress.textContent = total === 0 ? '— / —' : `${index+1} / ${total}`;
                if (total > 0) jumpInput.placeholder = `${index+1}`;
            }

            function updateFooter(index) {
                const total = chapters.length;
                if (total === 0) {
                    progressLabel.textContent = '无章节';
                    progressBar.style.width = '0%';
                    prevBtn.disabled = true;
                    nextBtn.disabled = true;
                    return;
                }
                progressLabel.textContent = `第 ${index+1} / ${total} 章`;
                progressBar.style.width = `${((index+1) / total) * 100}%`;
                prevBtn.disabled = index === 0;
                nextBtn.disabled = index === total - 1;
            }

            // ===== 文件列表渲染 =====
            function renderFileList() {
                fileList.innerHTML = '';
                if (!files.length) {
                    fileList.innerHTML = '<li style="color:var(--text-muted);padding:12px 18px;font-size:13px;">未找到 .txt 小说</li>';
                    fileCount.textContent = '0 本';
                    return;
                }
                files.forEach((f, i) => {
                    const li = document.createElement('li');
                    li.dataset.index = i;
                    li.innerHTML = `<span class="file-icon">📄</span><span class="file-name">${escapeHtml(f.name)}</span>`;
                    if (i === currentFileIndex) li.classList.add('active');
                    li.addEventListener('click', () => {
                        loadAndReadFile(i);
                        closeSidebar();
                    });
                    fileList.appendChild(li);
                });
                fileCount.textContent = `${files.length} 本`;
            }

            function updateSidebarHighlight() {
                const items = fileList.querySelectorAll('li');
                items.forEach(li => li.classList.remove('active'));
                if (currentFileIndex >= 0 && currentFileIndex < items.length) {
                    items[currentFileIndex].classList.add('active');
                }
            }

            // ===== 加载并阅读文件 =====
            async function loadAndReadFile(index, targetChapter) {
                if (isLoading) return;
                if (index < 0 || index >= files.length) return;
                const file = files[index];
                if (currentFileIndex === index && chapters.length > 0) {
                    // 已打开同一本，跳转到指定章节（或第一章）
                    if (targetChapter !== undefined && targetChapter < chapters.length) {
                        goToChapter(targetChapter);
                    } else {
                        goToChapter(0);
                    }
                    return;
                }

                isLoading = true;
                emptyState.classList.add('hidden');
                loadingState.classList.remove('hidden');
                readerContent.classList.add('hidden');

                try {
                    const content = await fetchFileContent(currentRepo, file.path);
                    if (!content || content.trim().length === 0) throw new Error('文件内容为空');
                    const parsed = parseNovel(content);
                    if (!parsed.length) throw new Error('未能识别到任何章节');

                    chapters = parsed;
                    currentFileIndex = index;
                    loadedChapterCount = 0;
                    currentChapterIndex = 0;
                    renderFileList();
                    const startChapter = (targetChapter !== undefined && targetChapter < chapters.length) ? targetChapter : 0;
                    resetReaderContent(startChapter);
                    bookTitle.textContent = file.name.replace(/\.txt$/i, '');
                    saveRepoState();
                    showToast(`✅ 加载成功，共 ${chapters.length} 章`);
                } catch (err) {
                    console.error(err);
                    showError(`加载失败：${err.message || '未知错误'}`);
                    emptyState.classList.remove('hidden');
                    loadingState.classList.add('hidden');
                    readerContent.classList.add('hidden');
                    showToast('❌ 加载失败，请重试', 3000);
                } finally {
                    isLoading = false;
                }
            }

            // ===== 固定仓库加载 =====
            const FIXED_REPO_URL = 'https://gitee.com/COGx3/word';

            async function loadFixedRepo(targetChapter) {
                const repo = parseRepoUrl(FIXED_REPO_URL);
                if (!repo) { showError('固定仓库地址无效'); return; }

                isLoading = true;
                emptyState.classList.remove('hidden');
                loadingState.classList.remove('hidden');
                readerContent.classList.add('hidden');
                fileList.innerHTML = '';

                try {
                    const fileListData = await fetchRepoFiles(repo);
                    if (!fileListData.length) throw new Error('仓库根目录下没有找到 .txt 文件');

                    files = fileListData;
                    currentRepo = repo;
                    currentFileIndex = -1;
                    chapters = [];
                    loadedChapterCount = 0;
                    currentChapterIndex = 0;
                    renderFileList();

                    emptyState.classList.remove('hidden');
                    loadingState.classList.add('hidden');
                    emptyState.querySelector('h2').textContent = `找到 ${files.length} 本小说`;
                    emptyState.querySelector('p').textContent = '点击左侧列表中的小说开始阅读';
                    bookTitle.textContent = '请选择小说';
                    progressLabel.textContent = '未阅读';
                    progressBar.style.width = '0%';
                    prevBtn.disabled = true;
                    nextBtn.disabled = true;
                    chapterProgress.textContent = '— / —';
                    jumpInput.placeholder = '章';

                    // 恢复进度或使用 targetChapter
                    let restoreChapter = null;
                    if (targetChapter !== undefined && targetChapter >= 0) {
                        restoreChapter = targetChapter;
                    } else {
                        const { progress } = restoreState();
                        if (progress && progress.fileIndex !== undefined && progress.fileIndex < files.length) {
                            await loadAndReadFile(progress.fileIndex, progress.chapter);
                            return;
                        }
                    }

                    if (files.length > 0) {
                        await loadAndReadFile(0, restoreChapter || 0);
                    }

                    saveRepoState();
                    if (files.length > 0) showToast(`📚 找到 ${files.length} 本小说`);
                } catch (err) {
                    console.error(err);
                    showError(`加载失败：${err.message || '未知错误'}`);
                    emptyState.classList.remove('hidden');
                    loadingState.classList.add('hidden');
                    readerContent.classList.add('hidden');
                    files = [];
                    renderFileList();
                    showToast('❌ 加载失败，请检查网络', 3000);
                } finally {
                    isLoading = false;
                }
            }

            // ===== 保存 / 恢复 =====
            function saveProgress(index) {
                if (!storage) return;
                try {
                    storage.setItem('novel_reader_progress', JSON.stringify({
                        repo: currentRepo,
                        fileIndex: currentFileIndex,
                        chapter: index,
                        loaded: loadedChapterCount,
                        total: chapters.length,
                        timestamp: Date.now()
                    }));
                } catch(e) {}
            }
            function saveRepoState() {
                if (!storage) return;
                try { storage.setItem('novel_reader_repo', currentRepo); } catch(e) {}
            }
            function restoreState() {
                if (!storage) return { repo: '', progress: null };
                try {
                    const repo = storage.getItem('novel_reader_repo') || '';
                    const progressRaw = storage.getItem('novel_reader_progress');
                    if (progressRaw) return { repo, progress: JSON.parse(progressRaw) };
                    return { repo, progress: null };
                } catch(e) { return { repo: '', progress: null }; }
            }

            // ===== 主题 & 字体 =====
            function toggleTheme() {
                theme = theme === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', theme);
                themeToggle.textContent = theme === 'light' ? '🌙' : '☀️';
                safeSetItem('novel_reader_theme', theme);
            }
            function restoreTheme() {
                const saved = safeGetItem('novel_reader_theme');
                if (saved === 'dark' || saved === 'light') theme = saved;
                else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) theme = 'dark';
                document.documentElement.setAttribute('data-theme', theme);
                themeToggle.textContent = theme === 'light' ? '🌙' : '☀️';
            }
            function setFontSize(size) {
                fontSize = Math.min(28, Math.max(12, size));
                document.documentElement.style.setProperty('--font-size', fontSize + 'px');
                fontSizeLabel.textContent = fontSize;
                safeSetItem('novel_reader_fontsize', String(fontSize));
            }
            function restoreFontSize() {
                const saved = safeGetItem('novel_reader_fontsize');
                if (saved) { const s = parseInt(saved,10); if (!isNaN(s) && s>=12 && s<=28) fontSize = s; }
                document.documentElement.style.setProperty('--font-size', fontSize + 'px');
                fontSizeLabel.textContent = fontSize;
            }

            // ===== 侧边栏控制 =====
            function toggleSidebar() {
                isSidebarOpen = !isSidebarOpen;
                sidebar.classList.toggle('open', isSidebarOpen);
                sidebarOverlay.classList.toggle('show', isSidebarOpen);
                document.body.style.overflow = isSidebarOpen ? 'hidden' : '';
            }
            function closeSidebar() {
                if (isSidebarOpen) {
                    isSidebarOpen = false;
                    sidebar.classList.remove('open');
                    sidebarOverlay.classList.remove('show');
                    document.body.style.overflow = '';
                }
            }

            // ===== 复制链接 =====
            function copyChapterLink() {
                if (currentFileIndex === -1 || chapters.length === 0) {
                    showToast('请先打开一本小说', 1500);
                    return;
                }
                const url = new URL(window.location.href);
                url.search = `?chapter=${currentChapterIndex}`;
                const link = url.toString();
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(link).then(() => {
                        showToast('✅ 链接已复制！', 2000);
                        copyLinkBtn.classList.add('copied');
                        setTimeout(() => copyLinkBtn.classList.remove('copied'), 2000);
                    }).catch(() => fallbackCopy(link));
                } else {
                    fallbackCopy(link);
                }
            }
            function fallbackCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand('copy');
                    showToast('✅ 链接已复制！', 2000);
                    copyLinkBtn.classList.add('copied');
                    setTimeout(() => copyLinkBtn.classList.remove('copied'), 2000);
                } catch(e) {
                    showToast('❌ 复制失败，请手动复制', 2000);
                }
                document.body.removeChild(ta);
            }

            // ===== 初始化 =====
            function init() {
                restoreTheme();
                restoreFontSize();

                themeToggle.addEventListener('click', toggleTheme);
                fontDec.addEventListener('click', () => setFontSize(fontSize - 2));
                fontInc.addEventListener('click', () => setFontSize(fontSize + 2));
                prevBtn.addEventListener('click', goToPrev);
                nextBtn.addEventListener('click', goToNext);
                copyLinkBtn.addEventListener('click', copyChapterLink);

                // 跳转事件
                jumpBtn.addEventListener('click', handleJump);
                jumpInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        handleJump();
                    }
                });

                document.addEventListener('keydown', (e) => {
                    if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                        if (e.key === 'Enter') return;
                    }
                    if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); goToPrev(); }
                    else if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); goToNext(); }
                    else if (e.key === 'Escape') closeSidebar();
                });

                menuToggle.addEventListener('click', toggleSidebar);
                sidebarOverlay.addEventListener('click', closeSidebar);
                contentArea.addEventListener('click', () => { if (window.innerWidth <= 768 && isSidebarOpen) closeSidebar(); });
                window.addEventListener('resize', () => { if (window.innerWidth > 768 && isSidebarOpen) closeSidebar(); });

                // 滚动到底部自动追加下一章（无缝）
                contentArea.addEventListener('scroll', function() {
                    if (isLoading || chapters.length === 0 || loadedChapterCount >= chapters.length) return;
                    const threshold = 80;
                    const { scrollTop, scrollHeight, clientHeight } = contentArea;
                    if (scrollTop + clientHeight >= scrollHeight - threshold) {
                        if (!isAutoScrolling) {
                            isAutoScrolling = true;
                            autoNextChapter();
                            setTimeout(() => { isAutoScrolling = false; }, 500);
                        }
                    }
                });

                // 解析 URL 参数（仅用于首次打开时恢复）
                const urlParams = new URLSearchParams(window.location.search);
                const chapterParam = urlParams.get('chapter');
                let targetChapter = null;
                if (chapterParam !== null) {
                    const parsed = parseInt(chapterParam, 10);
                    if (!isNaN(parsed) && parsed >= 0) targetChapter = parsed;
                }

                loadFixedRepo(targetChapter);
                console.log('📚 小说书架已启动，固定仓库:', FIXED_REPO_URL);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
