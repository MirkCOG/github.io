<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>📚 小说书架 · Gitee</title>
    <style>
        /* ===== CSS 变量 & 主题（同前，为省篇幅，此处略去，实际使用时请补全） ===== */
        /* 因篇幅限制，此处省略样式，请复制前面版本中完整的 <style> 块 */
    </style>
</head>
<body>
    <!-- ===== 顶部栏 ===== -->
    <header class="header">
        <div class="header-left">
            <button class="menu-toggle" id="menuToggle" aria-label="切换书架">☰</button>
            <div class="logo">📚 <span>书架</span></div>
            <div class="book-title" id="bookTitle">加载中…</div>
        </div>
        <div class="header-center">
            <span class="chapter-progress" id="chapterProgress">— / —</span>
        </div>
        <div class="header-right">
            <button class="btn-copy-link" id="copyLinkBtn" aria-label="复制章节链接" title="复制当前章节链接">📋</button>
            <div class="font-size-group">
                <button id="fontDec" aria-label="减小字号">A-</button>
                <span class="size-label" id="fontSizeLabel">18</span>
                <button id="fontInc" aria-label="增大字号">A+</button>
            </div>
            <button id="themeToggle" aria-label="切换主题">🌙</button>
        </div>
    </header>

    <!-- ===== 主体 ===== -->
    <div class="main">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>📖 小说列表</span>
                <span class="count" id="fileCount">0 本</span>
            </div>
            <ul class="file-list" id="fileList"></ul>
        </nav>
        <main class="content" id="contentArea">
            <div class="content-inner" id="contentInner">
                <div class="empty-state" id="emptyState">
                    <div class="icon">📚</div>
                    <h2>正在加载小说列表…</h2>
                    <p>请稍候，即将自动加载您的书架。</p>
                </div>
                <div class="loading-overlay hidden" id="loadingState">
                    <div class="spinner"></div>
                    <p>正在加载小说列表…</p>
                </div>
                <div id="readerContent" class="hidden"></div>
            </div>
        </main>
    </div>

    <!-- ===== 底部导航 ===== -->
    <footer class="footer" id="footerNav">
        <div class="progress">
            <span id="progressLabel">未阅读</span>
            <div class="bar-wrap">
                <div class="bar" id="progressBar"></div>
            </div>
        </div>
        <div class="nav-buttons">
            <button id="prevChapter" disabled>◀ 上一章 <span class="key-hint">←</span></button>
            <button id="nextChapter" disabled>下一章 ▶ <span class="key-hint">→</span></button>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            'use strict';

            // ---------- DOM 引用 ----------
            const emptyState = document.getElementById('emptyState');
            const loadingState = document.getElementById('loadingState');
            const readerContent = document.getElementById('readerContent');
            const fileList = document.getElementById('fileList');
            const fileCount = document.getElementById('fileCount');
            const bookTitle = document.getElementById('bookTitle');
            const chapterProgress = document.getElementById('chapterProgress');
            const progressLabel = document.getElementById('progressLabel');
            const progressBar = document.getElementById('progressBar');
            const prevBtn = document.getElementById('prevChapter');
            const nextBtn = document.getElementById('nextChapter');
            const themeToggle = document.getElementById('themeToggle');
            const fontDec = document.getElementById('fontDec');
            const fontInc = document.getElementById('fontInc');
            const fontSizeLabel = document.getElementById('fontSizeLabel');
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            const contentArea = document.getElementById('contentArea');
            const toast = document.getElementById('toast');
            const copyLinkBtn = document.getElementById('copyLinkBtn');

            // ---------- 状态 ----------
            let files = [];
            let chapters = [];
            let currentChapterIndex = 0;
            let currentFileIndex = -1;
            let isLoading = false;
            let fontSize = 18;
            let theme = 'light';
            let isSidebarOpen = false;
            let currentRepo = '';
            let isAutoScrolling = false;
            let loadedChapterCount = 0;

            // ---------- 安全的 localStorage ----------
            function safeLocalStorage() {
                try {
                    const test = 'test';
                    localStorage.setItem(test, test);
                    localStorage.removeItem(test);
                    return localStorage;
                } catch (e) {
                    return null;
                }
            }
            const storage = safeLocalStorage();

            function safeSetItem(key, value) {
                if (storage) {
                    try { storage.setItem(key, value); } catch (e) {}
                }
            }

            function safeGetItem(key) {
                if (storage) {
                    try { return storage.getItem(key); } catch (e) {}
                }
                return null;
            }

            // ---------- 工具函数 ----------
            function showToast(msg, duration) {
                duration = duration || 2000;
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => {
                    toast.classList.remove('show');
                }, duration);
            }

            function showError(msg) {
                showToast('❌ ' + msg, 3000);
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ===== Gitee 仓库解析 =====
            function parseRepoUrl(url) {
                url = url.trim();
                const match = url.match(/^https?:\/\/gitee\.com\/([^\/]+\/[^\/]+)\/?$/);
                if (match) {
                    return match[1];
                }
                return null;
            }

            // ===== Gitee API 获取文件列表 =====
            async function fetchRepoFiles(repo) {
                const apiUrl = `https://gitee.com/api/v5/repos/${repo}/contents/`;
                const response = await fetch(apiUrl, {
                    headers: {
                        'Accept': 'application/json',
                    }
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('仓库不存在或没有公开访问权限');
                    } else if (response.status === 403) {
                        throw new Error('API 请求频率限制，请稍后再试');
                    } else {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                }

                const data = await response.json();
                if (!Array.isArray(data)) {
                    throw new Error('无法解析文件列表');
                }

                const txtFiles = data.filter(item =>
                    item.type === 'file' &&
                    item.name.toLowerCase().endsWith('.txt')
                );

                return txtFiles.map(item => ({
                    name: item.name,
                    path: item.path,  // 用于API获取内容
                    size: item.size
                }));
            }

            // ===== 通过 Gitee API 获取文件内容 =====
            async function fetchFileContent(repo, path) {
                const apiUrl = `https://gitee.com/api/v5/repos/${repo}/contents/${encodeURIComponent(path)}`;
                const response = await fetch(apiUrl, {
                    headers: { 'Accept': 'application/json' }
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                if (!data.content) {
                    throw new Error('文件内容为空');
                }
                // 解码 Base64
                const base64 = data.content;
                // Gitee API 返回的 content 可能包含换行符，需要移除
                const raw = atob(base64.replace(/\s/g, ''));
                // 将 ASCII 字符串转为 UTF-8
                try {
                    return decodeURIComponent(escape(raw));
                } catch (e) {
                    // 如果解码失败，直接用 TextDecoder
                    const bytes = Uint8Array.from(raw, c => c.charCodeAt(0));
                    return new TextDecoder('utf-8').decode(bytes);
                }
            }

            // ===== 小说解析（同前） =====
            function parseNovel(text) {
                const lines = text.split(/\r?\n/);
                const result = [];
                let currentTitle = '全文';
                let currentContent = [];
                let foundChapter = false;

                const CHAPTER_PATTERNS = [
                    /^(第[零一二三四五六七八九十百千万0-9]+章)\s*(.*)/,
                    /^(第[零一二三四五六七八九十百千万0-9]+节)\s*(.*)/,
                    /^(第[零一二三四五六七八九十百千万0-9]+回)\s*(.*)/,
                    /^(卷[零一二三四五六七八九十百千万0-9]+)\s*(.*)/,
                    /^(Chapter\s*\d+)\s*(.*)/i,
                    /^(第[零一二三四五六七八九十百千万0-9]+部分)\s*(.*)/,
                    /^(序章|楔子|尾声|后记|番外|终章|引子|前言|后序)\s*(.*)/,
                ];

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    let matched = false;
                    for (const pattern of CHAPTER_PATTERNS) {
                        const m = line.match(pattern);
                        if (m) {
                            matched = true;
                            let title = m[1];
                            if (m[2] && m[2].trim()) {
                                title = title + ' ' + m[2].trim();
                            }
                            if (currentContent.length > 0 || foundChapter) {
                                result.push({
                                    title: currentTitle || '未命名章节',
                                    content: currentContent.join('\n')
                                });
                            } else {
                                if (currentContent.length > 0) {
                                    result.push({
                                        title: currentTitle || '前言',
                                        content: currentContent.join('\n')
                                    });
                                }
                            }
                            currentTitle = title;
                            currentContent = [];
                            foundChapter = true;
                            break;
                        }
                    }
                    if (!matched) {
                        currentContent.push(line);
                    }
                }

                if (currentContent.length > 0 || foundChapter) {
                    result.push({
                        title: currentTitle || '未命名章节',
                        content: currentContent.join('\n')
                    });
                }

                if (result.length === 0) {
                    const content = lines.join('\n').trim();
                    if (content) {
                        result.push({ title: '全文', content: content });
                    } else {
                        result.push({ title: '空内容', content: '' });
                    }
                }

                for (const ch of result) {
                    let lines2 = ch.content.split(/\r?\n/);
                    while (lines2.length > 0 && lines2[0].trim() === '') lines2.shift();
                    while (lines2.length > 0 && lines2[lines2.length - 1].trim() === '') lines2.pop();
                    ch.content = lines2.join('\n');
                }

                return result.filter(ch => ch.content.trim().length > 0 || ch.title);
            }

            // ===== 渲染单章 HTML =====
            function renderChapterHtml(index) {
                if (!chapters.length || index < 0 || index >= chapters.length) return '';
                const ch = chapters[index];
                const lines = ch.content.split(/\r?\n/);
                let html = `<div class="chapter-title">${escapeHtml(ch.title)}</div>`;
                html += `<div class="chapter-body">`;
                let inParagraph = false;
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (trimmed === '') {
                        if (inParagraph) {
                            html += `</p>`;
                            inParagraph = false;
                        }
                        html += `<div class="empty-line"></div>`;
                    } else {
                        if (!inParagraph) {
                            html += `<p>`;
                            inParagraph = true;
                        } else {
                            html += `</p><p>`;
                        }
                        html += escapeHtml(trimmed);
                    }
                }
                if (inParagraph) {
                    html += `</p>`;
                }
                html += `</div>`;
                return html;
            }

            // ===== 重置阅读内容 =====
            function resetReaderContent(startIndex) {
                if (!chapters.length) return;
                const html = renderChapterHtml(startIndex);
                readerContent.innerHTML = html;
                loadedChapterCount = startIndex + 1;
                currentChapterIndex = startIndex;
                contentArea.scrollTop = 0;
                updateFooter(currentChapterIndex);
                updateChapterProgress(currentChapterIndex);
                saveProgress(currentChapterIndex);
                updateSidebarHighlight();
                if (currentFileIndex >= 0 && currentFileIndex < files.length) {
                    bookTitle.textContent = files[currentFileIndex].name.replace(/\.txt$/i, '');
                }
                readerContent.classList.remove('hidden');
                emptyState.classList.add('hidden');
                loadingState.classList.add('hidden');
            }

            // ===== 追加下一章 =====
            function appendNextChapter() {
                if (loadedChapterCount >= chapters.length) {
                    showToast('已经是最后一章了', 1500);
                    return false;
                }
                const nextIdx = loadedChapterCount;
                const html = renderChapterHtml(nextIdx);
                readerContent.insertAdjacentHTML('beforeend', html);
                loadedChapterCount++;
                currentChapterIndex = nextIdx;
                updateFooter(currentChapterIndex);
                updateChapterProgress(currentChapterIndex);
                saveProgress(currentChapterIndex);
                updateSidebarHighlight();
                return true;
            }

            // ===== 跳转章节（手动） =====
            function goToChapter(index, keepScroll = false) {
                if (isLoading) return;
                if (index < 0) index = 0;
                if (index >= chapters.length) index = chapters.length - 1;

                if (index === currentChapterIndex && loadedChapterCount === chapters.length) {
                    contentArea.scrollTop = 0;
                    return;
                }

                if (index < loadedChapterCount) {
                    resetReaderContent(index);
                } else {
                    resetReaderContent(index);
                }
                contentArea.scrollTop = 0;
            }

            function goToNext() {
                if (currentChapterIndex < chapters.length - 1) {
                    const nextIdx = currentChapterIndex + 1;
                    if (nextIdx >= loadedChapterCount) {
                        resetReaderContent(nextIdx);
                    } else {
                        goToChapter(nextIdx, false);
                    }
                }
            }

            function goToPrev() {
                if (currentChapterIndex > 0) {
                    goToChapter(currentChapterIndex - 1, false);
                }
            }

            function autoNextChapter() {
                if (loadedChapterCount < chapters.length) {
                    const success = appendNextChapter();
                    if (success) {
                        showToast(`已加载下一章：${chapters[currentChapterIndex].title}`, 1200);
                    }
                }
            }

            // ===== 更新章节进度显示 =====
            function updateChapterProgress(index) {
                const total = chapters.length;
                if (total === 0) {
                    chapterProgress.textContent = '— / —';
                } else {
                    chapterProgress.textContent = `${index + 1} / ${total}`;
                }
            }

            // ===== 复制章节链接 =====
            function copyChapterLink() {
                if (currentFileIndex === -1 || chapters.length === 0) {
                    showToast('请先打开一本小说', 1500);
                    return;
                }
                const url = new URL(window.location.href);
                url.search = `?chapter=${currentChapterIndex}`;
                const link = url.toString();
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(link).then(() => {
                        showToast('✅ 链接已复制！', 2000);
                        copyLinkBtn.classList.add('copied');
                        setTimeout(() => copyLinkBtn.classList.remove('copied'), 2000);
                    }).catch(() => {
                        fallbackCopy(link);
                    });
                } else {
                    fallbackCopy(link);
                }
            }

            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showToast('✅ 链接已复制！', 2000);
                    copyLinkBtn.classList.add('copied');
                    setTimeout(() => copyLinkBtn.classList.remove('copied'), 2000);
                } catch (e) {
                    showToast('❌ 复制失败，请手动复制', 2000);
                }
                document.body.removeChild(textarea);
            }

            // ===== 文件列表渲染 =====
            function renderFileList() {
                fileList.innerHTML = '';
                if (!files.length) {
                    fileList.innerHTML = '<li style="color:var(--text-muted);padding:12px 18px;font-size:13px;">未找到 .txt 小说</li>';
                    fileCount.textContent = '0 本';
                    return;
                }

                files.forEach((f, i) => {
                    const li = document.createElement('li');
                    li.dataset.index = i;
                    li.innerHTML = `
                        <span class="file-icon">📄</span>
                        <span class="file-name">${escapeHtml(f.name)}</span>
                    `;
                    if (i === currentFileIndex) {
                        li.classList.add('active');
                    }
                    li.addEventListener('click', () => {
                        loadAndReadFile(i);
                        closeSidebar();
                    });
                    fileList.appendChild(li);
                });
                fileCount.textContent = `${files.length} 本`;
            }

            function updateSidebarHighlight() {
                const items = fileList.querySelectorAll('li');
                items.forEach(li => li.classList.remove('active'));
                if (currentFileIndex >= 0 && currentFileIndex < items.length) {
                    items[currentFileIndex].classList.add('active');
                }
            }

            function updateFooter(index) {
                const total = chapters.length;
                if (total === 0) {
                    progressLabel.textContent = '无章节';
                    progressBar.style.width = '0%';
                    prevBtn.disabled = true;
                    nextBtn.disabled = true;
                    return;
                }
                progressLabel.textContent = `第 ${index+1} / ${total} 章`;
                progressBar.style.width = `${((index+1) / total) * 100}%`;
                prevBtn.disabled = index === 0;
                nextBtn.disabled = index === total - 1;
            }

            // ===== 加载并阅读文件（使用 Gitee API） =====
            async function loadAndReadFile(index, targetChapter) {
                if (isLoading) return;
                if (index < 0 || index >= files.length) return;

                const file = files[index];
                if (currentFileIndex === index && chapters.length > 0) {
                    if (targetChapter !== undefined && targetChapter < chapters.length) {
                        resetReaderContent(targetChapter);
                    } else {
                        resetReaderContent(0);
                    }
                    return;
                }

                isLoading = true;
                emptyState.classList.add('hidden');
                loadingState.classList.remove('hidden');
                readerContent.classList.add('hidden');

                try {
                    const content = await fetchFileContent(currentRepo, file.path);
                    if (!content || content.trim().length === 0) {
                        throw new Error('文件内容为空');
                    }

                    const parsed = parseNovel(content);
                    if (!parsed.length) {
                        throw new Error('未能识别到任何章节');
                    }

                    chapters = parsed;
                    currentFileIndex = index;
                    loadedChapterCount = 0;
                    currentChapterIndex = 0;

                    renderFileList();
                    const startChapter = (targetChapter !== undefined && targetChapter < chapters.length) ? targetChapter : 0;
                    resetReaderContent(startChapter);
                    bookTitle.textContent = file.name.replace(/\.txt$/i, '');
                    saveRepoState();
                    showToast(`✅ 加载成功，共 ${chapters.length} 章`);

                } catch (err) {
                    console.error(err);
                    showError(`加载失败：${err.message || '未知错误'}`);
                    emptyState.classList.remove('hidden');
                    loadingState.classList.add('hidden');
                    readerContent.classList.add('hidden');
                    showToast('❌ 加载失败，请重试', 3000);
                } finally {
                    isLoading = false;
                }
            }

            // ===== 固定仓库加载 =====
            const FIXED_REPO_URL = 'https://gitee.com/COGx3/word';

            async function loadFixedRepo(targetChapter) {
                const repo = parseRepoUrl(FIXED_REPO_URL);
                if (!repo) {
                    showError('固定仓库地址无效');
                    return;
                }

                isLoading = true;
                emptyState.classList.remove('hidden');
                loadingState.classList.remove('hidden');
                readerContent.classList.add('hidden');
                fileList.innerHTML = '';

                try {
                    const fileListData = await fetchRepoFiles(repo);
                    if (!fileListData.length) {
                        throw new Error('仓库根目录下没有找到 .txt 文件');
                    }

                    files = fileListData;
                    currentRepo = repo;
                    currentFileIndex = -1;
                    chapters = [];
                    loadedChapterCount = 0;
                    currentChapterIndex = 0;

                    renderFileList();

                    emptyState.classList.remove('hidden');
                    loadingState.classList.add('hidden');
                    emptyState.querySelector('h2').textContent = `找到 ${files.length} 本小说`;
                    emptyState.querySelector('p').textContent = '点击左侧列表中的小说开始阅读';

                    bookTitle.textContent = '请选择小说';
                    progressLabel.textContent = '未阅读';
                    progressBar.style.width = '0%';
                    prevBtn.disabled = true;
                    nextBtn.disabled = true;
                    chapterProgress.textContent = '— / —';

                    // 尝试恢复进度或使用 targetChapter
                    let restoreChapter = null;
                    if (targetChapter !== undefined && targetChapter >= 0) {
                        restoreChapter = targetChapter;
                    } else {
                        const { progress } = restoreState();
                        if (progress && progress.fileIndex !== undefined && progress.fileIndex < files.length) {
                            await loadAndReadFile(progress.fileIndex, progress.chapter);
                            return;
                        }
                    }

                    if (files.length > 0 && restoreChapter === null) {
                        await loadAndReadFile(0, 0);
                    } else if (files.length > 0 && restoreChapter !== null) {
                        await loadAndReadFile(0, restoreChapter);
                    }

                    saveRepoState();
                    if (files.length > 0) {
                        showToast(`📚 找到 ${files.length} 本小说`);
                    }

                } catch (err) {
                    console.error(err);
                    showError(`加载失败：${err.message || '未知错误'}`);
                    emptyState.classList.remove('hidden');
                    loadingState.classList.add('hidden');
                    readerContent.classList.add('hidden');
                    files = [];
                    renderFileList();
                    showToast('❌ 加载失败，请检查网络', 3000);
                } finally {
                    isLoading = false;
                }
            }

            // ===== 保存 / 恢复 =====
            function saveProgress(index) {
                try {
                    if (!storage) return;
                    const data = {
                        repo: currentRepo,
                        fileIndex: currentFileIndex,
                        chapter: index,
                        loaded: loadedChapterCount,
                        total: chapters.length,
                        timestamp: Date.now()
                    };
                    storage.setItem('novel_reader_progress', JSON.stringify(data));
                } catch (e) { /* ignore */ }
            }

            function saveRepoState() {
                try {
                    if (!storage) return;
                    storage.setItem('novel_reader_repo', currentRepo);
                } catch (e) { /* ignore */ }
            }

            function restoreState() {
                try {
                    if (!storage) return { repo: '', progress: null };
                    const repo = storage.getItem('novel_reader_repo') || '';
                    const progressRaw = storage.getItem('novel_reader_progress');
                    if (progressRaw) {
                        const progress = JSON.parse(progressRaw);
                        return { repo, progress };
                    }
                    return { repo, progress: null };
                } catch (e) {
                    return { repo: '', progress: null };
                }
            }

            // ===== 主题 & 字体 =====
            function toggleTheme() {
                theme = theme === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', theme);
                themeToggle.textContent = theme === 'light' ? '🌙' : '☀️';
                safeSetItem('novel_reader_theme', theme);
            }

            function restoreTheme() {
                try {
                    const saved = safeGetItem('novel_reader_theme');
                    if (saved === 'dark' || saved === 'light') {
                        theme = saved;
                    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                        theme = 'dark';
                    }
                } catch (e) { /* ignore */ }
                document.documentElement.setAttribute('data-theme', theme);
                themeToggle.textContent = theme === 'light' ? '🌙' : '☀️';
            }

            function setFontSize(size) {
                fontSize = Math.min(28, Math.max(12, size));
                document.documentElement.style.setProperty('--font-size', fontSize + 'px');
                fontSizeLabel.textContent = fontSize;
                safeSetItem('novel_reader_fontsize', String(fontSize));
            }

            function restoreFontSize() {
                try {
                    const saved = safeGetItem('novel_reader_fontsize');
                    if (saved) {
                        const size = parseInt(saved, 10);
                        if (!isNaN(size) && size >= 12 && size <= 28) {
                            fontSize = size;
                        }
                    }
                } catch (e) { /* ignore */ }
                document.documentElement.style.setProperty('--font-size', fontSize + 'px');
                fontSizeLabel.textContent = fontSize;
            }

            // ===== 侧边栏控制 =====
            function toggleSidebar() {
                isSidebarOpen = !isSidebarOpen;
                sidebar.classList.toggle('open', isSidebarOpen);
                sidebarOverlay.classList.toggle('show', isSidebarOpen);
                document.body.style.overflow = isSidebarOpen ? 'hidden' : '';
            }

            function closeSidebar() {
                if (isSidebarOpen) {
                    isSidebarOpen = false;
                    sidebar.classList.remove('open');
                    sidebarOverlay.classList.remove('show');
                    document.body.style.overflow = '';
                }
            }

            // ===== 初始化 =====
            function init() {
                restoreTheme();
                restoreFontSize();

                themeToggle.addEventListener('click', toggleTheme);
                fontDec.addEventListener('click', () => setFontSize(fontSize - 2));
                fontInc.addEventListener('click', () => setFontSize(fontSize + 2));
                prevBtn.addEventListener('click', goToPrev);
                nextBtn.addEventListener('click', goToNext);
                copyLinkBtn.addEventListener('click', copyChapterLink);

                document.addEventListener('keydown', (e) => {
                    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
                    if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                        e.preventDefault();
                        goToPrev();
                    } else if (e.key === 'ArrowRight' || e.key === 'PageDown') {
                        e.preventDefault();
                        goToNext();
                    } else if (e.key === 'Escape') {
                        closeSidebar();
                    }
                });

                menuToggle.addEventListener('click', toggleSidebar);
                sidebarOverlay.addEventListener('click', closeSidebar);

                contentArea.addEventListener('click', () => {
                    if (window.innerWidth <= 768 && isSidebarOpen) closeSidebar();
                });

                window.addEventListener('resize', () => {
                    if (window.innerWidth > 768 && isSidebarOpen) closeSidebar();
                });

                // 滚动到底部自动追加下一章
                contentArea.addEventListener('scroll', function() {
                    if (isLoading || chapters.length === 0) return;
                    if (loadedChapterCount >= chapters.length) return;

                    const threshold = 80;
                    const scrollTop = contentArea.scrollTop;
                    const scrollHeight = contentArea.scrollHeight;
                    const clientHeight = contentArea.clientHeight;
                    if (scrollTop + clientHeight >= scrollHeight - threshold) {
                        if (!isAutoScrolling) {
                            isAutoScrolling = true;
                            autoNextChapter();
                            setTimeout(() => {
                                isAutoScrolling = false;
                            }, 500);
                        }
                    }
                });

                // 解析 URL 参数中的 chapter
                const urlParams = new URLSearchParams(window.location.search);
                const chapterParam = urlParams.get('chapter');
                let targetChapter = null;
                if (chapterParam !== null) {
                    const parsed = parseInt(chapterParam, 10);
                    if (!isNaN(parsed) && parsed >= 0) {
                        targetChapter = parsed;
                    }
                }

                loadFixedRepo(targetChapter);

                console.log('📚 小说书架已启动，固定仓库:', FIXED_REPO_URL);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
