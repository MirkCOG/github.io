    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #030510;
            z-index: -1;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Arial, sans-serif;
            perspective: 800px;
            overflow-x: hidden;
        }

        .glass-panel {
            max-width: 950px;
            width: 100%;
            background: rgba(20, 22, 27, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            padding: 35px 25px 45px 25px;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .glass-panel > * {
            width: auto;
            max-width: 100%;
            flex-shrink: 0;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.4);
        }
        .main-id {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 25px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff, #ccccff, #aaccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(0, 160, 255, 0.3);
        }
        .music-card {
            background: rgba(25, 35, 55, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 12px 28px;
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
            transition: all 0.25s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            width: auto;
            max-width: 100%;
        }
        .music-card:hover {
            background: rgba(45, 60, 85, 0.85);
            border-color: rgba(90, 150, 220, 0.6);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }
        .uid-nav-block {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 18px 24px;
            margin-bottom: 30px;
        }
        .uid-item {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100px;
            padding: 14px 6px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-decoration: none;
            color: #ffffff;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);

        .uid-item i {

        }
        .uid-img {

        }
        .uid-item span {
            font-size: 0.75rem;
            font-weight: 500;
            opacity: 0.9;
            white-space: nowrap;
        }
        .uid-item:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-8px);
        }

        .link-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 10px;
            width: 100%;
        }
        .link-buttons a {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            padding: 8px 20px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
        }
        .link-buttons a:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .music-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 1;
            min-width: 0;
        }
        .music-mini-cover {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
            background: #2c2f33;
            flex-shrink: 0;
        }
        .music-mini-info {
            text-align: left;
            white-space: nowrap;
        }
        .music-mini-title {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .music-mini-icon {
            color: #6c8eff;
            font-size: 0.85rem;
        }
        .volume-control-inline {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 4px 12px;
            flex-shrink: 0;
        }
        .volume-control-inline i {
            font-size: 0.9rem;
            color: #b8c7ff;
            cursor: pointer;
            width: 24px;
            text-align: center;
        }
        .volume-slider {
            -webkit-appearance: none;
            width: 90px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffffff;
            border: none;
            box-shadow: 0 0 4px #6c8eff;
            cursor: pointer;
        }
        .volume-percent {
            min-width: 38px;
            text-align: right;
            color: #ddd;
            font-size: 0.7rem;
        }
        @media (max-width: 680px) {
            .main-id {
                font-size: 2rem;
            }
            .music-card {
                padding: 10px 20px;
            }
            .uid-item {
                width: 80px;
                padding: 10px 4px;
            }
            .uid-item i {
                font-size: 1.5rem;
            }
            .music-left {
                flex-wrap: wrap;
                justify-content: center;
            }
            .volume-control-inline {
                margin-left: 0;
                margin-top: 6px;
            }
            .volume-slider {
                width: 70px;
            }
            .music-mini-info {
                white-space: normal;
            }
            .link-buttons a {
                padding: 6px 16px;
                font-size: 0.8rem;
            }
        }
    </style>

<script>
    (function() {
        const starConfig = {
            starCount: window.innerWidth < 768 ? 80 : 150,
            starMaxSize: 2.2,
            starMinSize: 0.4,
            moveSpeed: 0.22,
            lineDistance: 150,
            mouseFollowRange: 200,
            flickerSpeed: 0.009,
            starColor: '255,255,255',
            lineColor: '210,220,255'
        };
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let mouseX = null, mouseY = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initStars() {
            stars = [];
            for(let i = 0; i < starConfig.starCount; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * (starConfig.starMaxSize - starConfig.starMinSize) + starConfig.starMinSize,
                    speedX: (Math.random() - 0.5) * starConfig.moveSpeed,
                    speedY: (Math.random() - 0.5) * starConfig.moveSpeed,
                    opacity: Math.random(),
                    flickerDir: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function drawStars() {
            ctx.fillStyle = 'rgba(3, 5, 16, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach((star, idx) => {
                star.opacity += star.flickerDir * starConfig.flickerSpeed;
                if(star.opacity > 1) star.flickerDir = -1;
                if(star.opacity < 0.2) star.flickerDir = 1;
                star.x += star.speedX;
                star.y += star.speedY;
                if(star.x < 0 || star.x > canvas.width) star.speedX *= -1;
                if(star.y < 0 || star.y > canvas.height) star.speedY *= -1;
                if(mouseX !== null && mouseY !== null) {
                    let dx = star.x - mouseX, dy = star.y - mouseY;
                    let dist = Math.hypot(dx, dy);
                    if(dist < starConfig.mouseFollowRange) {
                        let force = (starConfig.mouseFollowRange - dist) / starConfig.mouseFollowRange;
                        star.x += dx * force * 0.03;
                        star.y += dy * force * 0.03;
                    }
                }
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${starConfig.starColor}, ${star.opacity * 0.9})`;
                ctx.fill();
                for(let j = idx + 1; j < stars.length; j++) {
                    let s2 = stars[j];
                    let dx = star.x - s2.x, dy = star.y - s2.y;
                    let dist = Math.hypot(dx, dy);
                    if(dist < starConfig.lineDistance) {
                        let alpha = (1 - dist / starConfig.lineDistance) * 0.25;
                        ctx.beginPath();
                        ctx.moveTo(star.x, star.y);
                        ctx.lineTo(s2.x, s2.y);
                        ctx.strokeStyle = `rgba(${starConfig.lineColor}, ${alpha})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(drawStars);
        }
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('mouseout', () => { mouseX = null; mouseY = null; });
        window.addEventListener('resize', () => { resizeCanvas(); initStars(); });
        resizeCanvas();
        initStars();
        drawStars();
    })();

    (function() {
        const fullText = "MirkCOG";
        const typeInterval = 1200;
        const holdTime = 5000;
        let currentIndex = 0;
        let timer = null;
        let isHolding = false;
        const titleElem = document.querySelector('title');
        if (!titleElem) return;

        function stopAnimation() {
            if (timer) {
                clearTimeout(timer);
                timer = null;
            }
        }

        function startTyping() {
            stopAnimation();
            currentIndex = 0;
            isHolding = false;
            titleElem.innerText = "";
            stepTyping();
        }

        function stepTyping() {
            if (isHolding) return;
            if (currentIndex < fullText.length) {
                currentIndex++;
                titleElem.innerText = fullText.substring(0, currentIndex);
                timer = setTimeout(stepTyping, typeInterval);
            } else {
                isHolding = true;
                timer = setTimeout(() => {
                    startTyping();
                }, holdTime);
            }
        }
        startTyping();
    })();

    (function() {
        const panel = document.getElementById('tiltPanel');
        if (!panel) return;
        const maxRotateX = 5;
        const maxRotateY = 5;
        
        function handleMouseMove(e) {
            const rect = panel.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const offsetX = (e.clientX - centerX) / (rect.width / 2);
            const offsetY = (e.clientY - centerY) / (rect.height / 2);
            const clampedX = Math.min(Math.max(offsetX, -1), 1);
            const clampedY = Math.min(Math.max(offsetY, -1), 1);
            const rotY = clampedX * maxRotateY;
            const rotX = -clampedY * maxRotateX;
            panel.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        }
        
        function resetTilt() {
            panel.style.transform = 'rotateX(0deg) rotateY(0deg)';
        }
        
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseleave', resetTilt);
        window.addEventListener('mouseout', (e) => {
            if (e.relatedTarget === null) resetTilt();
        });
    })();

    (function() {
        const audio = document.getElementById('hiddenAudio');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumePercent = document.getElementById('volumePercent');
        const volumeIcon = document.getElementById('volumeIcon');
        if (!audio) return;

        let savedVolume = localStorage.getItem('musicVolume');
        if (savedVolume !== null && !isNaN(parseFloat(savedVolume))) {
            savedVolume = Math.min(1, Math.max(0, parseFloat(savedVolume)));
        } else {
            savedVolume = 0.20;
        }
        audio.volume = savedVolume;
        if (volumeSlider) volumeSlider.value = savedVolume;
        if (volumePercent) volumePercent.innerText = Math.round(savedVolume * 100) + '%';
        
        function updateVolumeIcon(vol) {
            if (!volumeIcon) return;
            if (vol <= 0) volumeIcon.className = 'fas fa-volume-mute';
            else if (vol < 0.5) volumeIcon.className = 'fas fa-volume-down';
            else volumeIcon.className = 'fas fa-volume-up';
        }
        updateVolumeIcon(savedVolume);

        if (volumeSlider) {
            volumeSlider.addEventListener('input', function(e) {
                let val = parseFloat(e.target.value);
                audio.volume = val;
                if (volumePercent) volumePercent.innerText = Math.round(val * 100) + '%';
                updateVolumeIcon(val);
                localStorage.setItem('musicVolume', val);
            });
        }

        if (volumeIcon) {
            volumeIcon.style.cursor = 'pointer';
            volumeIcon.addEventListener('click', function() {
                if (audio.volume > 0) {
                    localStorage.setItem('musicVolume_beforeMute', audio.volume);
                    audio.volume = 0;
                    if (volumeSlider) volumeSlider.value = 0;
                    if (volumePercent) volumePercent.innerText = '0%';
                    updateVolumeIcon(0);
                } else {
                    let lastVol = localStorage.getItem('musicVolume_beforeMute');
                    let newVol = (lastVol && !isNaN(parseFloat(lastVol))) ? parseFloat(lastVol) : 0.20;
                    audio.volume = newVol;
                    if (volumeSlider) volumeSlider.value = newVol;
                    if (volumePercent) volumePercent.innerText = Math.round(newVol * 100) + '%';
                    updateVolumeIcon(newVol);
                    localStorage.setItem('musicVolume', newVol);
                }
            });
        }
        
        function attemptAutoPlay() {
            audio.play().then(() => {
            }).catch((err) => {
                const startOnInteraction = function() {
                    audio.play().catch(e => console.warn('music error:', e));
                    document.removeEventListener('click', startOnInteraction);
                    document.removeEventListener('touchstart', startOnInteraction);
                };
                document.addEventListener('click', startOnInteraction);
                document.addEventListener('touchstart', startOnInteraction);
            });
        }
        
        window.addEventListener('load', attemptAutoPlay);
    })();
</script>
