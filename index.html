        * {

            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;

        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #030510;

        }
        body {

            perspective: 800px;
            overflow-x: hidden;
        }
        .glass-panel {
            max-width: 950px;
            width: 100%;
            background: rgba(20, 22, 27, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            padding: 35px 25px 45px 25px;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .glass-panel > * {
            width: auto;
            max-width: 100%;
            flex-shrink: 0;
        }
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.4);
        }

            font-weight: 900;

            letter-spacing: 2px;

            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(0, 160, 255, 0.3);
        }
        .music-card {
            background: rgba(25, 35, 55, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 12px 28px;
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
            transition: all 0.25s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            width: auto;
            max-width: 100%;
        }
        .music-card:hover {
            background: rgba(45, 60, 85, 0.85);
            border-color: rgba(90, 150, 220, 0.6);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }
        .music-left {

            align-items: center;
            gap: 12px;
            flex-shrink: 1;
            min-width: 0;
        }
        .music-mini-cover {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
            background: #2c2f33;
            flex-shrink: 0;
        }
        .music-mini-info {
            text-align: left;
            white-space: nowrap;
        }
        .music-mini-title {

            align-items: center;

        .music-mini-icon {

        }
        .volume-control-inline {

            align-items: center;

            border-radius: 30px;
            padding: 4px 12px;
            flex-shrink: 0;
        }
        .volume-control-inline i {

            color: #b8c7ff;
            cursor: pointer;
            width: 24px;
            text-align: center;
        }
        .volume-slider {
            -webkit-appearance: none;
            width: 90px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

            height: 12px;
            border-radius: 50%;

            border: none;
            box-shadow: 0 0 4px #6c8eff;
            cursor: pointer;

<script>
    (function() {
        const starConfig = {
            starCount: window.innerWidth < 768 ? 80 : 150,
            starMaxSize: 2.2,
            starMinSize: 0.4,
            moveSpeed: 0.22,
            lineDistance: 150,
            mouseFollowRange: 200,
            flickerSpeed: 0.009,
            starColor: '255,255,255',
            lineColor: '210,220,255'
        };
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let mouseX = null, mouseY = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initStars() {
            stars = [];
            for(let i = 0; i < starConfig.starCount; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * (starConfig.starMaxSize - starConfig.starMinSize) + starConfig.starMinSize,
                    speedX: (Math.random() - 0.5) * starConfig.moveSpeed,
                    speedY: (Math.random() - 0.5) * starConfig.moveSpeed,
                    opacity: Math.random(),
                    flickerDir: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function drawStars() {
            ctx.fillStyle = 'rgba(3, 5, 16, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach((star, idx) => {
                star.opacity += star.flickerDir * starConfig.flickerSpeed;
                if(star.opacity > 1) star.flickerDir = -1;
                if(star.opacity < 0.2) star.flickerDir = 1;
                star.x += star.speedX;
                star.y += star.speedY;
                if(star.x < 0 || star.x > canvas.width) star.speedX *= -1;
                if(star.y < 0 || star.y > canvas.height) star.speedY *= -1;
                if(mouseX !== null && mouseY !== null) {
                    let dx = star.x - mouseX, dy = star.y - mouseY;
                    let dist = Math.hypot(dx, dy);
                    if(dist < starConfig.mouseFollowRange) {
                        let force = (starConfig.mouseFollowRange - dist) / starConfig.mouseFollowRange;
                        star.x += dx * force * 0.03;
                        star.y += dy * force * 0.03;
                    }
                }
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${starConfig.starColor}, ${star.opacity * 0.9})`;
                ctx.fill();
                for(let j = idx + 1; j < stars.length; j++) {
                    let s2 = stars[j];
                    let dx = star.x - s2.x, dy = star.y - s2.y;
                    let dist = Math.hypot(dx, dy);
                    if(dist < starConfig.lineDistance) {
                        let alpha = (1 - dist / starConfig.lineDistance) * 0.25;
                        ctx.beginPath();
                        ctx.moveTo(star.x, star.y);
                        ctx.lineTo(s2.x, s2.y);
                        ctx.strokeStyle = `rgba(${starConfig.lineColor}, ${alpha})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(drawStars);
        }
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('mouseout', () => { mouseX = null; mouseY = null; });
        window.addEventListener('resize', () => { resizeCanvas(); initStars(); });
        resizeCanvas();
        initStars();
        drawStars();
    })();

    (function() {
        const fullText = "MirkCOG";

        let currentIndex = 0;
        let timer = null;
        let isHolding = false;
        const titleElem = document.querySelector('title');
        if (!titleElem) return;
        function stopAnimation() { if (timer) { clearTimeout(timer); timer = null; } }
        function startTyping() { stopAnimation(); currentIndex = 0; isHolding = false; titleElem.innerText = ""; stepTyping(); }
        function stepTyping() {
            if (isHolding) return;
            if (currentIndex < fullText.length) {
                currentIndex++;
                titleElem.innerText = fullText.substring(0, currentIndex);
                timer = setTimeout(stepTyping, typeInterval);
            } else {
                isHolding = true;
                timer = setTimeout(() => { startTyping(); }, holdTime);
            }
        }
        startTyping();
    })();

    (function() {
        const panel = document.getElementById('tiltPanel');
        if (!panel) return;
        let active = true;
        let mouseMoveHandler = null, mouseLeaveHandler = null;
        const maxRotateX = 5, maxRotateY = 5;
        function handleMouseMove(e) {
            if (!active) return;
            const rect = panel.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let offsetX = (e.clientX - centerX) / (rect.width / 2);
            let offsetY = (e.clientY - centerY) / (rect.height / 2);
            offsetX = Math.min(Math.max(offsetX, -1), 1);
            offsetY = Math.min(Math.max(offsetY, -1), 1);
            const rotY = offsetX * maxRotateY;
            const rotX = -offsetY * maxRotateX;
            panel.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        }
        function resetTilt() { panel.style.transform = 'rotateX(0deg) rotateY(0deg)'; }
        function enableTilt() { if (mouseMoveHandler) document.removeEventListener('mousemove', mouseMoveHandler); if (mouseLeaveHandler) document.removeEventListener('mouseleave', mouseLeaveHandler); mouseMoveHandler = handleMouseMove; mouseLeaveHandler = resetTilt; document.addEventListener('mousemove', mouseMoveHandler); document.addEventListener('mouseleave', mouseLeaveHandler); active = true; }
        function disableTilt() { if (mouseMoveHandler) { document.removeEventListener('mousemove', mouseMoveHandler); document.removeEventListener('mouseleave', mouseLeaveHandler); mouseMoveHandler = null; mouseLeaveHandler = null; } resetTilt(); active = false; }
        function checkMobileAndAdjust() { const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || window.innerWidth <= 768; if (isMobile) disableTilt(); else { if (!active) enableTilt(); else if (!mouseMoveHandler) enableTilt(); } }
        window.addEventListener('resize', checkMobileAndAdjust);
        checkMobileAndAdjust();
    })();

    (function() {
        const audio = document.getElementById('hiddenAudio');
        const desktopSlider = document.getElementById('volumeSlider');
        const desktopPercent = document.getElementById('volumePercent');
        const desktopIcon = document.getElementById('volumeIcon');
        const mobileSlider = document.getElementById('volumeSliderMobile');
        const mobilePercent = document.getElementById('volumePercentMobile');
        const mobileIcon = document.getElementById('volumeIconMobile');
        let savedVolume = localStorage.getItem('musicVolume');
        if (savedVolume !== null && !isNaN(parseFloat(savedVolume))) savedVolume = Math.min(1, Math.max(0, parseFloat(savedVolume)));
        else savedVolume = 0.20;
        audio.volume = savedVolume;
        function updateAllUI(vol) {
            const percent = Math.round(vol * 100) + '%';
            if (desktopSlider) desktopSlider.value = vol;
            if (desktopPercent) desktopPercent.innerText = percent;
            if (mobileSlider) mobileSlider.value = vol;
            if (mobilePercent) mobilePercent.innerText = percent;
            const iconClass = vol <= 0 ? 'fas fa-volume-mute' : (vol < 0.5 ? 'fas fa-volume-down' : 'fas fa-volume-up');
            if (desktopIcon) desktopIcon.className = iconClass;
            if (mobileIcon) mobileIcon.className = iconClass;
        }
        function handleVolumeChange(val) { audio.volume = val; updateAllUI(val); localStorage.setItem('musicVolume', val); }
        if (desktopSlider) desktopSlider.addEventListener('input', (e) => handleVolumeChange(parseFloat(e.target.value)));
        if (mobileSlider) mobileSlider.addEventListener('input', (e) => handleVolumeChange(parseFloat(e.target.value)));
        function toggleMute() {
            if (audio.volume > 0) { localStorage.setItem('musicVolume_beforeMute', audio.volume); handleVolumeChange(0); }
            else { let lastVol = localStorage.getItem('musicVolume_beforeMute'); let newVol = (lastVol && !isNaN(parseFloat(lastVol))) ? parseFloat(lastVol) : 0.20; handleVolumeChange(newVol); }
        }
        if (desktopIcon) { desktopIcon.style.cursor = 'pointer'; desktopIcon.addEventListener('click', toggleMute); }
        if (mobileIcon) { mobileIcon.style.cursor = 'pointer'; mobileIcon.addEventListener('click', toggleMute); }
        updateAllUI(savedVolume);
        function attemptAutoPlay() { audio.play().catch(() => { const startOnInteraction = function() { audio.play().catch(e=>console.warn(e)); document.removeEventListener('click', startOnInteraction); document.removeEventListener('touchstart', startOnInteraction); }; document.addEventListener('click', startOnInteraction); document.addEventListener('touchstart', startOnInteraction); }); }
        window.addEventListener('load', attemptAutoPlay);
    })();
