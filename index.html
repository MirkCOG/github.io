<script>
    (function() {
        const starConfig = {
            starCount: window.innerWidth < 768 ? 80 : 150,
            starMaxSize: 2.2,
            starMinSize: 0.4,
            moveSpeed: 0.22,
            lineDistance: 150,
            mouseFollowRange: 200,
            flickerSpeed: 0.009,
            starColor: '255,255,255',
            lineColor: '210,220,255'
        };
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let mouseX = null, mouseY = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initStars() {
            stars = [];
            for(let i = 0; i < starConfig.starCount; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * (starConfig.starMaxSize - starConfig.starMinSize) + starConfig.starMinSize,
                    speedX: (Math.random() - 0.5) * starConfig.moveSpeed,
                    speedY: (Math.random() - 0.5) * starConfig.moveSpeed,
                    opacity: Math.random(),
                    flickerDir: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function drawStars() {
            ctx.fillStyle = 'rgba(3, 5, 16, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach((star, idx) => {
                star.opacity += star.flickerDir * starConfig.flickerSpeed;
                if(star.opacity > 1) star.flickerDir = -1;
                if(star.opacity < 0.2) star.flickerDir = 1;
                star.x += star.speedX;
                star.y += star.speedY;
                if(star.x < 0 || star.x > canvas.width) star.speedX *= -1;
                if(star.y < 0 || star.y > canvas.height) star.speedY *= -1;
                if(mouseX !== null && mouseY !== null) {
                    let dx = star.x - mouseX, dy = star.y - mouseY;
                    let dist = Math.hypot(dx, dy);
                    if(dist < starConfig.mouseFollowRange) {
                        let force = (starConfig.mouseFollowRange - dist) / starConfig.mouseFollowRange;
                        star.x += dx * force * 0.03;
                        star.y += dy * force * 0.03;
                    }
                }
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${starConfig.starColor}, ${star.opacity * 0.9})`;
                ctx.fill();
                for(let j = idx + 1; j < stars.length; j++) {
                    let s2 = stars[j];
                    let dx = star.x - s2.x, dy = star.y - s2.y;
                    let dist = Math.hypot(dx, dy);
                    if(dist < starConfig.lineDistance) {
                        let alpha = (1 - dist / starConfig.lineDistance) * 0.25;
                        ctx.beginPath();
                        ctx.moveTo(star.x, star.y);
                        ctx.lineTo(s2.x, s2.y);
                        ctx.strokeStyle = `rgba(${starConfig.lineColor}, ${alpha})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(drawStars);
        }
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('mouseout', () => { mouseX = null; mouseY = null; });
        window.addEventListener('resize', () => { resizeCanvas(); initStars(); });
        resizeCanvas();
        initStars();
        drawStars();
    })();

    (function() {
        const fullText = "MirkCOG";
        const typeInterval = 1200;
        const holdTime = 5000;
        let currentIndex = 0;
        let timer = null;
        let isHolding = false;
        const titleElem = document.querySelector('title');
        if (!titleElem) return;

        function stopAnimation() {
            if (timer) {
                clearTimeout(timer);
                timer = null;
            }
        }

        function startTyping() {
            stopAnimation();
            currentIndex = 0;
            isHolding = false;
            titleElem.innerText = "";
            stepTyping();
        }

        function stepTyping() {
            if (isHolding) return;
            if (currentIndex < fullText.length) {
                currentIndex++;
                titleElem.innerText = fullText.substring(0, currentIndex);
                timer = setTimeout(stepTyping, typeInterval);
            } else {
                isHolding = true;
                timer = setTimeout(() => {
                    startTyping();
                }, holdTime);
            }
        }
        startTyping();
    })();

    (function() {
        const panel = document.getElementById('tiltPanel');
        if (!panel) return;
        let active = true;
        let mouseMoveHandler = null;
        let mouseLeaveHandler = null;
        
        const maxRotateX = 5;
        const maxRotateY = 5;
        
        function handleMouseMove(e) {
            if (!active) return;
            const rect = panel.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let offsetX = (e.clientX - centerX) / (rect.width / 2);
            let offsetY = (e.clientY - centerY) / (rect.height / 2);
            offsetX = Math.min(Math.max(offsetX, -1), 1);
            offsetY = Math.min(Math.max(offsetY, -1), 1);
            const rotY = offsetX * maxRotateY;
            const rotX = -offsetY * maxRotateX;
            panel.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        }
        
        function resetTilt() {
            panel.style.transform = 'rotateX(0deg) rotateY(0deg)';
        }
        
        function enableTilt() {
            if (mouseMoveHandler) document.removeEventListener('mousemove', mouseMoveHandler);
            if (mouseLeaveHandler) document.removeEventListener('mouseleave', mouseLeaveHandler);
            mouseMoveHandler = handleMouseMove;
            mouseLeaveHandler = resetTilt;
            document.addEventListener('mousemove', mouseMoveHandler);
            document.addEventListener('mouseleave', mouseLeaveHandler);
            active = true;
        }
        
        function disableTilt() {
            if (mouseMoveHandler) {
                document.removeEventListener('mousemove', mouseMoveHandler);
                document.removeEventListener('mouseleave', mouseLeaveHandler);
                mouseMoveHandler = null;
                mouseLeaveHandler = null;
            }
            resetTilt();
            active = false;
        }
        
        function checkMobileAndAdjust() {
            const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || window.innerWidth <= 768;
            if (isMobile) {
                disableTilt();
            } else {
                if (!active) enableTilt();
                else if (!mouseMoveHandler) enableTilt();
            }
        }
        
        window.addEventListener('resize', checkMobileAndAdjust);
        checkMobileAndAdjust();
    })();

    (function() {
        const audio = document.getElementById('hiddenAudio');
        const desktopSlider = document.getElementById('volumeSlider');
        const desktopPercent = document.getElementById('volumePercent');
        const desktopIcon = document.getElementById('volumeIcon');
        const mobileSlider = document.getElementById('volumeSliderMobile');
        const mobilePercent = document.getElementById('volumePercentMobile');
        const mobileIcon = document.getElementById('volumeIconMobile');

        let savedVolume = localStorage.getItem('musicVolume');
        if (savedVolume !== null && !isNaN(parseFloat(savedVolume))) {
            savedVolume = Math.min(1, Math.max(0, parseFloat(savedVolume)));
        } else {
            savedVolume = 0.20;
        }
        audio.volume = savedVolume;

        function updateAllUI(vol) {
            const percent = Math.round(vol * 100) + '%';
            if (desktopSlider) desktopSlider.value = vol;
            if (desktopPercent) desktopPercent.innerText = percent;
            if (mobileSlider) mobileSlider.value = vol;
            if (mobilePercent) mobilePercent.innerText = percent;
            
            const iconClass = vol <= 0 ? 'fas fa-volume-mute' : (vol < 0.5 ? 'fas fa-volume-down' : 'fas fa-volume-up');
            if (desktopIcon) desktopIcon.className = iconClass;
            if (mobileIcon) mobileIcon.className = iconClass;
        }

        function handleVolumeChange(val) {
            audio.volume = val;
            updateAllUI(val);
            localStorage.setItem('musicVolume', val);
        }

        if (desktopSlider) {
            desktopSlider.addEventListener('input', (e) => handleVolumeChange(parseFloat(e.target.value)));
            desktopSlider.addEventListener('touchstart', (e) => e.stopPropagation());
        }
        if (mobileSlider) {
            mobileSlider.addEventListener('input', (e) => handleVolumeChange(parseFloat(e.target.value)));
            mobileSlider.addEventListener('touchstart', (e) => e.stopPropagation());
        }

        function toggleMute() {
            if (audio.volume > 0) {
                localStorage.setItem('musicVolume_beforeMute', audio.volume);
                handleVolumeChange(0);
            } else {
                let lastVol = localStorage.getItem('musicVolume_beforeMute');
                let newVol = (lastVol && !isNaN(parseFloat(lastVol))) ? parseFloat(lastVol) : 0.20;
                handleVolumeChange(newVol);
            }
        }

        if (desktopIcon) {
            desktopIcon.style.cursor = 'pointer';
            desktopIcon.addEventListener('click', toggleMute);
        }
        if (mobileIcon) {
            mobileIcon.style.cursor = 'pointer';
            mobileIcon.addEventListener('click', toggleMute);
        }

        updateAllUI(savedVolume);
        
        function attemptAutoPlay() {
            audio.play().then(() => {}).catch(() => {
                const startOnInteraction = function() {
                    audio.play().catch(e => console.warn('playback resume:', e));
                    document.removeEventListener('click', startOnInteraction);
                    document.removeEventListener('touchstart', startOnInteraction);
                };
                document.addEventListener('click', startOnInteraction);
                document.addEventListener('touchstart', startOnInteraction);
            });
        }
        window.addEventListener('load', attemptAutoPlay);
    })();

    function toggleLayoutByWidth() {
        const isMobile = window.innerWidth <= 680;
        const desktopInfo = document.querySelector('.desktop-only-info');
        const desktopVol = document.querySelector('.desktop-volume');
        const mobileStack = document.querySelector('.mobile-stack');
        if (desktopInfo) desktopInfo.style.display = isMobile ? 'none' : '';
        if (desktopVol) desktopVol.style.display = isMobile ? 'none' : 'flex';
        if (mobileStack) mobileStack.style.display = isMobile ? 'flex' : 'none';
    }
    window.addEventListener('resize', toggleLayoutByWidth);
    toggleLayoutByWidth();
</script>
</body>
</html>
